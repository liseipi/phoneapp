name: phone_app
description: A Flutter phone calling application with recording features
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  url_launcher: ^6.2.1
  flutter_phone_direct_caller: ^2.1.1
  permission_handler: ^11.3.0
  record: ^6.2.0
  file_picker: ^10.3.10
  path_provider: ^2.1.1
  just_audio: ^0.9.36
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  http: ^1.1.0
  dio: ^5.4.0
  flutter_contacts: ^1.1.9+1
  provider: ^6.1.1
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true